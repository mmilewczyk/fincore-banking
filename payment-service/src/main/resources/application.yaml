spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5433/payment_db
    username: fincore
    password: fincore_secret
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Named pool for JMX/metrics identification
      pool-name: PaymentHikariCP
      # Leak detection: log if connection held > 60s (catches missing finally/try-with-resources)
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Batch inserts — OutboxPoller writes many rows; batching reduces DB round-trips
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Avro serializer — encodes messages as Confluent wire format:
      # [magic byte 0x00][schema-id 4 bytes][avro payload]
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        # Schema Registry — required by KafkaAvroSerializer
        schema.registry.url: ${kafka.schema-registry.url:http://localhost:8081}
        # auto.register.schemas: true in local dev, false in prod (overridden by env/profile)
        auto.register.schemas: true
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 50
      properties:
        max.poll.interval.ms: 300000
        schema.registry.url: ${kafka.schema-registry.url:http://localhost:8081}
        # specific.avro.reader: deserialize into generated SpecificRecord classes
        specific.avro.reader: true

# ─── Schema Registry ──────────────────────────────────────────────────────────
# Confluent Schema Registry URL. Used by both KafkaAvroSerializer (producer)
# and KafkaAvroDeserializer (consumer) for schema lookup and registration.
#
# Local dev: http://localhost:8081 (docker-compose)
# K8s: http://schema-registry.fincore.svc.cluster.local:8081
# Override via: KAFKA_SCHEMA_REGISTRY_URL env var in K8s Deployment
kafka:
  schema-registry:
    url: http://localhost:8081

  data:
    redis:
      host: localhost
      port: 6379
      password: fincore_redis_secret

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/fincore
          jwk-set-uri: http://localhost:8180/realms/fincore/protocol/openid-connect/certs

server:
  port: 8082
  shutdown: graceful
  tomcat:
    # Tuned for K8s — payment processing is I/O bound (Account Service, FX Service, DB)
    threads:
      max: 50
      min-spare: 10
    connection-timeout: 5000

services:
  account:
    base-url: http://localhost:8081
  fx:
    base-url: http://localhost:8084

resilience4j:
  circuitbreaker:
    instances:
      account-service:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 15s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        eventConsumerBufferSize: 20
      fx-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 20
  retry:
    instances:
      account-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignoreExceptions:
          # Don't retry business exceptions — they won't resolve on retry
          - java.lang.IllegalStateException
          - java.util.NoSuchElementException
      fx-service:
        maxAttempts: 2
        waitDuration: 1s
        # FX rates are time-sensitive — fewer retries, faster fail
  timelimiter:
    instances:
      account-service:
        timeoutDuration: 5s
      fx-service:
        timeoutDuration: 10s

outbox:
  poller:
    batch-size: 100       # Messages per poll cycle
    fixed-delay-ms: 500   # Interval between polls

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,loggers,env
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true        # /actuator/health/liveness + /actuator/health/readiness for K8s
  health:
    circuitbreakers:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: payment-service  # Common label on all metrics for Grafana filtering
  tracing:
    sampling:
      probability: 1.0    # 100% in dev — reduce to 0.1 in prod
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.fincore: DEBUG
    org.springframework.kafka: INFO
    org.redisson: WARN   # Redisson is verbose; suppress unless debugging locks
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"