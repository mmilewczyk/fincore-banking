name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

env:
  JAVA_VERSION: '25'

jobs:

  # ─── Detect which services changed ───────────────────────────────────────────
  # Avoids running tests for services that haven't changed.
  # A PR touching only payment-service doesn't need to rebuild fraud-detection-service.

  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      account-service: ${{ steps.changes.outputs.account-service }}
      payment-service: ${{ steps.changes.outputs.payment-service }}
      fraud-detection-service: ${{ steps.changes.outputs.fraud-detection-service }}
      fx-service: ${{ steps.changes.outputs.fx-service }}
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      parent-pom: ${{ steps.changes.outputs.parent-pom }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            account-service:
              - 'account-service/**'
            payment-service:
              - 'payment-service/**'
            fraud-detection-service:
              - 'fraud-detection-service/**'
            fx-service:
              - 'fx-service/**'
            api-gateway:
              - 'api-gateway/**'
            notification-service:
              - 'notification-service/**'
            parent-pom:
              - 'pom.xml'

  # ─── Fast unit tests (changed services only) ─────────────────────────────────
  unit-tests:
    name: Unit Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    # Run if the service changed OR if parent POM changed (could affect all services)
    if: |
      needs.detect-changes.outputs.parent-pom == 'true' ||
      needs.detect-changes.outputs[matrix.service] == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - payment-service
          - fraud-detection-service
          - fx-service
          - api-gateway
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install parent POM
        run: mvn install -N -DskipTests -q

      - name: Unit tests - ${{ matrix.service }}
        run: mvn test -pl ${{ matrix.service }}

      - name: Comment test results on PR
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '${{ matrix.service }}/target/surefire-reports/*.xml'
          check_name: 'Unit Tests - ${{ matrix.service }}'
          fail_on_failure: true

  # ─── PR title lint (Conventional Commits) ────────────────────────────────────
  pr-title:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            docs
            chore
            ci
            perf
          # Examples: "feat(payment): add FX conversion", "fix(fraud): handle null score"
          # Enforces Conventional Commits - enables automatic changelog generation

  # ─── Build check (compile only, no tests) ────────────────────────────────────
  # Catches compilation errors on the full multi-module build quickly.
  compile-check:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile all modules
        run: mvn compile -DskipTests -q