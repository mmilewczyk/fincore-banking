version: 2

updates:

  # ── Maven dependencies ────────────────────────────────────────────────────────
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Warsaw"
    # Group minor/patch updates into a single PR - reduces noise
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework.cloud:*"
      testcontainers:
        patterns:
          - "org.testcontainers:*"
      confluent:
        patterns:
          - "io.confluent:*"
          - "org.apache.avro:*"
    # Only open PRs for security updates outside the group schedule
    open-pull-requests-limit: 10
    reviewers:
      - ${{ github.repository_owner }}
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── GitHub Actions ────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Warsaw"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"