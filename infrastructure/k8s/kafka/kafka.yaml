apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: fincore
spec:
  serviceName: kafka
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
            - containerPort: 9093   # controller port (KRaft)
          env:
            - name: KAFKA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name   # kafka-0, kafka-1, kafka-2
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka.fincore.svc.cluster.local:9093,1@kafka-1.kafka.fincore.svc.cluster.local:9093,2@kafka-2.kafka.fincore.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(KAFKA_NODE_ID).kafka.fincore.svc.cluster.local:9092"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: fincore
spec:
  type: ClusterIP
  clusterIP: None   # Headless service for StatefulSet DNS (kafka-0.kafka, kafka-1.kafka, ...)
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
---
# Kafka topics — created once via a Job, not auto-created
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: fincore
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics
          image: confluentinc/cp-kafka:7.6.0
          command:
            - /bin/bash
            - -c
            - |
              KAFKA="kafka-0.kafka.fincore.svc.cluster.local:9092"

              create() {
                kafka-topics --bootstrap-server $KAFKA --create --if-not-exists \
                  --topic $1 --partitions $2 --replication-factor 3 \
                  --config retention.ms=$3 --config min.insync.replicas=2
              }

              # Payment topics (7-day retention)
              create fincore.payments.payment-initiated        3  604800000
              create fincore.payments.payment-completed        3  604800000
              create fincore.payments.payment-failed           3  604800000
              create fincore.payments.payment-fraud-rejected   3  604800000
              create fincore.payments.payment-initiated.DLT    1  2592000000  # 30-day DLT

              # Fraud topics
              create fincore.fraud.case-approved    3  604800000
              create fincore.fraud.case-blocked     3  604800000
              create fincore.fraud.case-escalated   3  604800000
              create fincore.fraud.confirmed        3  2592000000  # 30-day for compliance

              # FX topics
              create fincore.fx.rate-published      3  86400000   # 1-day (rates refresh frequently)
              create fincore.fx.conversion-executed 3  604800000
              create fincore.fx.conversion-failed   3  604800000

              # Account topics
              create fincore.accounts.account-debited   3  604800000
              create fincore.accounts.account-credited  3  604800000

              echo "All topics created."