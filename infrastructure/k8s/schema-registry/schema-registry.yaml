# ─────────────────────────────────────────────────────────────────────────────
# Schema Registry — Confluent Platform 7.6.0
#
# Architecture:
#   - 2 replicas (HA) — one pod per availability zone via podAntiAffinity
#   - Stateless — schemas stored in Kafka internal topic (_schemas)
#   - Headless service + ClusterIP service for internal access
#
# Schema evolution strategy: BACKWARD (global default)
#   - New consumers can read old messages (missing fields → defaults)
#   - Safe rolling deploys: new payment-service reads old fraud-service messages
#   - Override per-subject via API: PUT /config/{subject}
#
# Subject naming: TopicNameStrategy (Confluent default)
#   Topic "fincore.fraud.case-approved" → subject "fincore.fraud.case-approved-value"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: fincore
  labels:
    app: schema-registry
    component: messaging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
      annotations:
        # Prometheus scraping — Schema Registry exposes JMX metrics on /metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      # Spread replicas across nodes — Schema Registry is stateless but losing both
      # replicas simultaneously blocks all Avro serialization/deserialization
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [ schema-registry ]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.6.0
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "kafka-0.kafka.fincore.svc.cluster.local:9092,kafka-1.kafka.fincore.svc.cluster.local:9092,kafka-2.kafka.fincore.svc.cluster.local:9092"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
            # BACKWARD compatibility for all subjects globally.
            # Individual subjects can override via REST API.
            - name: SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL
              value: "BACKWARD"
            # Replication factor for _schemas internal topic — must be <= broker count
            - name: SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR
              value: "3"
            # Enable Schema Registry to serve as master (leader election via Kafka)
            - name: SCHEMA_REGISTRY_MASTER_ELIGIBILITY
              value: "true"
            # JVM heap — 512MB is sufficient for most deployments
            - name: SCHEMA_REGISTRY_HEAP_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: fincore
  labels:
    app: schema-registry
spec:
  type: ClusterIP
  selector:
    app: schema-registry
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
# ─────────────────────────────────────────────────────────────────────────────
# Schema Registration Job — runs once per deploy to register/update schemas.
#
# WHY A JOB?
#   auto.register.schemas=false in production.
#   All schemas must be pre-registered before services start consuming/producing.
#   This Job runs in the CI/CD pipeline before the Deployment rollout.
#
# BACKWARD COMPATIBILITY CHECK:
#   The curl commands below register schemas AND verify compatibility.
#   If a schema change is incompatible (e.g. removed field without default),
#   the Job fails → deployment blocked → no broken consumers.
#
# In a real pipeline this would be replaced by a dedicated schema management
# tool (e.g. schema-registry-maven-plugin or Terraform Confluent provider).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-registry-init
  namespace: fincore
  annotations:
    # Runs before Deployment rollout in Helm/ArgoCD pipeline
    helm.sh/hook: pre-upgrade,pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-init
          image: curlimages/curl:8.6.0
          command:
            - /bin/sh
            - -c
            - |
              SR="http://schema-registry.fincore.svc.cluster.local:8081"

              # Wait for Schema Registry to be ready
              until curl -sf "$SR/subjects" > /dev/null; do
                echo "Waiting for Schema Registry..."
                sleep 3
              done
              echo "Schema Registry is ready"

              # Helper: register schema and check compatibility
              register_schema() {
                SUBJECT="$1"
                SCHEMA_FILE="$2"
                echo "Registering schema for subject: $SUBJECT"

                # Check compatibility first (will fail if registry has a previous version)
                COMPAT=$(curl -sf -X POST \
                  -H "Content-Type: application/vnd.schemaregistry.v1+json" \
                  --data "{\"schema\": $(cat $SCHEMA_FILE | tr -d '\n')}" \
                  "$SR/compatibility/subjects/$SUBJECT/versions/latest" 2>/dev/null || echo "{}")

                echo "Compatibility check: $COMPAT"

                # Register the schema
                curl -f -X POST \
                  -H "Content-Type: application/vnd.schemaregistry.v1+json" \
                  --data "{\"schema\": $(cat $SCHEMA_FILE | tr -d '\n')}" \
                  "$SR/subjects/$SUBJECT/versions"
                echo ""
              }

              # Set global compatibility to BACKWARD
              curl -f -X PUT \
                -H "Content-Type: application/vnd.schemaregistry.v1+json" \
                -d '{"compatibility": "BACKWARD"}' \
                "$SR/config"

              # Payment Service schemas (producer)
              register_schema "fincore.payments.payment-initiated-value"       /schemas/payment/PaymentInitiatedEvent.avsc
              register_schema "fincore.payments.payment-completed-value"       /schemas/payment/PaymentCompletedEvent.avsc
              register_schema "fincore.payments.payment-failed-value"          /schemas/payment/PaymentFailedEvent.avsc
              register_schema "fincore.payments.payment-fraud-rejected-value"  /schemas/payment/PaymentFraudRejectedEvent.avsc
              register_schema "fincore.payments.payment-cancelled-value"       /schemas/payment/PaymentCancelledEvent.avsc

              # Fraud Detection Service schemas (producer — consumed by Payment Service)
              register_schema "fincore.fraud.case-approved-value"   /schemas/fraud/FraudCaseApprovedEvent.avsc
              register_schema "fincore.fraud.case-blocked-value"    /schemas/fraud/FraudCaseBlockedEvent.avsc
              register_schema "fincore.fraud.case-escalated-value"  /schemas/fraud/FraudCaseEscalatedEvent.avsc
              register_schema "fincore.fraud.confirmed-value"       /schemas/fraud/FraudConfirmedEvent.avsc

              echo "All schemas registered successfully"
          volumeMounts:
            - name: payment-schemas
              mountPath: /schemas/payment
            - name: fraud-schemas
              mountPath: /schemas/fraud
      volumes:
        # ConfigMaps contain the .avsc file contents.
        # Built by the CI pipeline from the source .avsc files.
        - name: payment-schemas
          configMap:
            name: payment-avro-schemas
        - name: fraud-schemas
          configMap:
            name: fraud-avro-schemas