apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: fincore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: account-service
          image: fincore/account-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: account-db-secret
                  key: url
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: account-db-secret
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.fincore.svc.cluster.local:9092"
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1Gi",   cpu: "500m" }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: fincore
spec:
  type: ClusterIP
  selector:
    app: account-service
  ports:
    - port: 8081
      targetPort: 8081