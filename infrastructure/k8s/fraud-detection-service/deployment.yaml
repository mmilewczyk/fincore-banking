apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
  namespace: fincore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: fraud-detection-service
          image: fincore/fraud-detection-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: url
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.fincore.svc.cluster.local:9092"
            - name: SERVICES_ACCOUNT_BASE_URL
              value: "http://account-service.fincore.svc.cluster.local:8081"
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1Gi",   cpu: "500m" }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            initialDelaySeconds: 60
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
  namespace: fincore
spec:
  type: ClusterIP
  selector:
    app: fraud-detection-service
  ports:
    - port: 8083
      targetPort: 8083