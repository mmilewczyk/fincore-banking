# ─────────────────────────────────────────────────────────────────────────────
# ConfigMaps - Avro schema files for schema-registry-init Job.
#
# In a real CI/CD pipeline these are built dynamically from the .avsc files
# in the source tree (e.g. via kustomize configMapGenerator or Helm --set-file).
# They are committed here for completeness and as a reference for manual deploys.
#
# Update process:
#   1. Modify .avsc file in source tree
#   2. Run schema compatibility check: mvn avro:schema (or CI step)
#   3. Rebuild ConfigMap: kubectl create configmap ... --from-file=... --dry-run=client -o yaml
#   4. Apply: kubectl apply -f schema-configmaps.yaml
#   5. Re-run schema-registry-init Job: kubectl delete job schema-registry-init && kubectl apply -f schema-registry.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-avro-schemas
  namespace: fincore
  labels:
    app: schema-registry
    managed-by: ci-pipeline
data:
  # Keys must match the mount path filenames in the Job volumeMounts
  PaymentInitiatedEvent.avsc: |
    {
      "type": "record",
      "name": "PaymentInitiatedEvent",
      "namespace": "com.fincore.payment.avro",
      "fields": [
        { "name": "eventId",         "type": "string" },
        { "name": "occurredAt",      "type": { "type": "long", "logicalType": "timestamp-millis" } },
        { "name": "paymentId",       "type": "string" },
        { "name": "idempotencyKey",  "type": "string" },
        { "name": "sourceAccountId", "type": "string" },
        { "name": "targetAccountId", "type": "string" },
        { "name": "amount",          "type": { "type": "bytes", "logicalType": "decimal", "precision": 19, "scale": 4 } },
        { "name": "currency",        "type": { "type": "enum", "name": "Currency", "namespace": "com.fincore.payment.avro", "symbols": ["PLN","EUR","USD","GBP","CHF","JPY"] } },
        { "name": "paymentType",     "type": { "type": "enum", "name": "PaymentType", "namespace": "com.fincore.payment.avro", "symbols": ["INTERNAL_TRANSFER","EXTERNAL_TRANSFER","BILL_PAYMENT","FX_CONVERSION"] } },
        { "name": "initiatedBy",     "type": "string" },
        { "name": "schemaVersion",   "type": "int", "default": 1 }
      ]
    }

  PaymentCompletedEvent.avsc: |
    {
      "type": "record",
      "name": "PaymentCompletedEvent",
      "namespace": "com.fincore.payment.avro",
      "fields": [
        { "name": "eventId",              "type": "string" },
        { "name": "occurredAt",           "type": { "type": "long", "logicalType": "timestamp-millis" } },
        { "name": "paymentId",            "type": "string" },
        { "name": "sourceAccountId",      "type": "string" },
        { "name": "targetAccountId",      "type": "string" },
        { "name": "amount",               "type": { "type": "bytes", "logicalType": "decimal", "precision": 19, "scale": 4 } },
        { "name": "currency",             "type": "com.fincore.payment.avro.Currency" },
        { "name": "paymentType",          "type": "com.fincore.payment.avro.PaymentType" },
        { "name": "processingDurationMs", "type": ["null", "long"], "default": null },
        { "name": "schemaVersion",        "type": "int", "default": 1 }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-avro-schemas
  namespace: fincore
  labels:
    app: schema-registry
    managed-by: ci-pipeline
data:
  FraudCaseApprovedEvent.avsc: |
    {
      "type": "record",
      "name": "FraudCaseApprovedEvent",
      "namespace": "com.fincore.fraud.avro",
      "fields": [
        { "name": "eventId",        "type": "string" },
        { "name": "occurredAt",     "type": { "type": "long", "logicalType": "timestamp-millis" } },
        { "name": "fraudCaseId",    "type": "string" },
        { "name": "paymentId",      "type": "string" },
        { "name": "fraudScore",     "type": "int" },
        { "name": "rulesEvaluated", "type": "int" },
        { "name": "reviewedBy",     "type": ["null", "string"], "default": null },
        { "name": "schemaVersion",  "type": "int", "default": 1 }
      ]
    }

  FraudCaseBlockedEvent.avsc: |
    {
      "type": "record",
      "name": "FraudCaseBlockedEvent",
      "namespace": "com.fincore.fraud.avro",
      "fields": [
        {
          "name": "eventId",
          "type": "string"},
        {
          "name": "occurredAt",
          "type": {
            "type": "long",
            "logicalType": "timestamp-millis"}},
        {
          "name": "fraudCaseId",
          "type": "string"},
        {
          "name": "paymentId",
          "type": "string"},
        {
          "name": "fraudScore",
          "type": "int"},
        {
          "name": "triggeringRule",
          "type": "string"},
        {
          "name": "reason",
          "type": "string"},
        {
          "name": "ruleScores",
          "type": {
            "type": "map",
            "values": "int"},
          "default": {}},
        {
          "name": "schemaVersion",
          "type": "int",
          "default": 1}
      ]
    }

  FraudConfirmedEvent.avsc: |
    {
      "type": "record",
      "name": "FraudConfirmedEvent",
      "namespace": "com.fincore.fraud.avro",
      "fields": [
        { "name": "eventId",          "type": "string" },
        { "name": "occurredAt",       "type": { "type": "long", "logicalType": "timestamp-millis" } },
        { "name": "fraudCaseId",      "type": "string" },
        { "name": "paymentId",        "type": "string" },
        { "name": "confirmedBy",      "type": "string" },
        { "name": "notes",            "type": "string" },
        { "name": "reversalRequired", "type": "boolean", "default": true },
        { "name": "schemaVersion",    "type": "int", "default": 1 }
      ]
    }