<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Completed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            max-width: 560px;
            margin: 0 auto;
            padding: 32px;
        }

        .header {
            color: #1a1a2e;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .amount {
            font-size: 32px;
            font-weight: bold;
            color: #16a34a;
            margin: 24px 0;
        }

        .detail {
            color: #555;
            font-size: 14px;
            margin: 8px 0;
        }

        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 32px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">✓ Payment Completed</div>
    <p class="detail">Your payment has been processed successfully.</p>
    <div class="amount" th:text="${formattedAmount}">100.00 EUR</div>
    <p class="detail">To account: <strong th:text="${targetAccount}">PL61...2874</strong></p>
    <p class="detail">Reference: <span th:text="${paymentId}">pay-123</span></p>
    <div class="footer">
        This is an automated notification from FinCore Banking.<br/>
        Notification ID: <span th:text="${notificationId}">notif-123</span>
    </div>
</div>
</body>
</html>
