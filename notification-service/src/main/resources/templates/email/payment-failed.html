<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Failed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            max-width: 560px;
            margin: 0 auto;
            padding: 32px;
        }

        .header {
            color: #dc2626;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .amount {
            font-size: 24px;
            color: #1a1a2e;
            margin: 16px 0;
        }

        .reason {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            padding: 12px 16px;
            margin: 16px 0;
            color: #555;
        }

        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 32px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">✗ Payment Failed</div>
    <p>We were unable to process your payment of <span class="amount" th:text="${formattedAmount}">100.00 EUR</span>.
    </p>
    <div class="reason">Reason: <strong th:text="${reason}">Insufficient funds</strong></div>
    <p style="color:#555;font-size:14px;">Reference: <span th:text="${paymentId}">pay-123</span></p>
    <p style="color:#555;font-size:14px;">Please try again or contact support if this is unexpected.</p>
    <div class="footer">FinCore Banking · Notification ID: <span th:text="${notificationId}">notif-123</span></div>
</div>
</body>
</html>
