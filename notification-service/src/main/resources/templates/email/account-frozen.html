<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Account Frozen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            max-width: 560px;
            margin: 0 auto;
            padding: 32px;
            border-top: 4px solid #7c3aed;
        }

        .header {
            color: #7c3aed;
            font-size: 22px;
            font-weight: bold;
        }

        .reason {
            background: #faf5ff;
            border-left: 4px solid #7c3aed;
            padding: 12px 16px;
            margin: 16px 0;
            color: #555;
        }

        .cta {
            background: #7c3aed;
            color: #fff;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 16px;
        }

        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 32px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">🔒 Account Frozen</div>
    <p style="color:#555;">Your account <strong th:text="${accountId}">PL61...2874</strong> has been frozen.</p>
    <div class="reason">Reason: <span th:text="${reason}">Suspicious activity detected</span></div>
    <p style="color:#555;">To unfreeze your account, please contact our support team immediately.</p>
    <a class="cta" href="https://fincore.com/support">Contact Support</a>
    <div class="footer">FinCore Banking · Notification ID: <span th:text="${notificationId}">notif-123</span></div>
</div>
</body>
</html>
